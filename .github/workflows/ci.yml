name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  UV_VERSION: '0.6'

jobs:
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
      - name: Install dependencies
        run: uv sync --frozen --dev --no-install-project
      - name: Check formatting (ruff format)
        run: uv run ruff format --check src/ tests/
      - name: Lint (ruff check)
        run: uv run ruff check src/ tests/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
      - name: Install dependencies
        run: uv sync --frozen --dev --no-install-project --python ${{ matrix.python-version }}
      - name: Run tests with coverage
        run: uv run pytest -v --tb=short --cov=stargazing_core --cov-report=xml --cov-report=term
      - name: Enforce 100% diff coverage
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            COMPARE_REF="origin/$BASE_REF"
            git fetch origin "$BASE_REF" --depth=1
          else
            COMPARE_REF="$BEFORE_SHA"
          fi

          if [ -z "$COMPARE_REF" ]; then
            COMPARE_REF="origin/$DEFAULT_BRANCH"
            git fetch origin "$DEFAULT_BRANCH" --depth=1
          fi

          python -m pip install --upgrade diff-cover
          diff-cover coverage.xml --compare-branch="$COMPARE_REF" --fail-under=100
