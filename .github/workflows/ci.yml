name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: '0.6'
      - name: Install dependencies
        run: uv sync --frozen --dev --no-install-project
      - name: Check formatting (ruff format)
        run: uv run ruff format --check src/ tests/
      - name: Lint (ruff check)
        run: uv run ruff check src/ tests/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: '0.6'
      - name: Install dependencies
        run: uv sync --frozen --dev --no-install-project --python ${{ matrix.python-version }}
      - name: Run tests with coverage
        run: uv run pytest -v --tb=short --cov=stargazing_core --cov-report=xml --cov-report=term
      - name: Check diff-cover (100%)
        if: matrix.python-version == '3.13'
        run: |
          git fetch origin +refs/heads/master:refs/remotes/origin/master
          uv pip install diff-cover -q
          uv run diff-cover coverage.xml --compare-branch=origin/master --fail-under=100
